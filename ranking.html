<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無限流模擬器 — 排行榜</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/game-components.css">
</head>
<body>
  <div class="game-layout">
    <div class="top-bar">
      <div class="top-bar-left">
        <a href="lobby.html" class="top-bar-logo" style="text-decoration:none">🌀 無限流模擬器</a>
        <div class="top-bar-tabs">
          <a href="lobby.html" class="tab-btn">🏠 大廳</a>
          <a href="game.html" class="tab-btn">⚔️ 冒險</a>
          <a href="inventory.html" class="tab-btn">🎒 背包</a>
          <a href="shop.html" class="tab-btn">🏪 商店</a>
          <a href="ranking.html" class="tab-btn active">🏆 排行</a>
        </div>
      </div>
      <div class="top-bar-right">
        <span class="status-badge">💰 <span id="currency-val">0</span></span>
        <div class="avatar-mini" id="avatar-display">🦉</div>
      </div>
    </div>

    <div class="game-content" style="overflow-y:auto">
      <div class="ranking-container">
        <div class="ranking-header" style="border:none;padding-top:24px">
          <h1>🏆 玩家排行榜</h1>
          <p style="color:var(--text-light);font-size:14px;margin-bottom:16px">
            基於綜合評分排名 · 加入無限流世界，爭奪最強稱號！
          </p>
          <div class="ranking-tabs">
            <button class="tab-btn active" data-sort="rating" onclick="RankUI.switchTab(this)">📊 綜合評分</button>
            <button class="tab-btn" data-sort="clears" onclick="RankUI.switchTab(this)">🗂️ 通關次數</button>
            <button class="tab-btn" data-sort="te" onclick="RankUI.switchTab(this)">✨ TE 達成</button>
          </div>
        </div>

        <div class="tier-legend">
          <span class="tier-legend-item common">⚪ 普通</span>
          <span class="tier-legend-item uncommon">🟢 優秀</span>
          <span class="tier-legend-item rare">🔵 稀有</span>
          <span class="tier-legend-item epic">🟣 史詩</span>
          <span class="tier-legend-item legendary">🟠 傳說</span>
          <span class="tier-legend-item divine">🔴 ✦神級</span>
        </div>

        <div class="ranking-table" id="ranking-list">
          <!-- Rendered by JS -->
        </div>

        <div class="ranking-info-card">
          <h3>📋 評分系統說明</h3>
          <div class="ranking-info-text">
            <p><strong>綜合評分</strong> 反映玩家嘅整體實力，計算方式：</p>
            <ul>
              <li><strong>通關基礎分</strong>：每個副本按難度加權（F=10, E=25, D=50, C=100, B=200, A=400）</li>
              <li><strong>TE 獎勵</strong>：達成 True End 獲得 3 倍分數加乘</li>
              <li><strong>道具收藏</strong>：按道具稀有度計入總分（神級道具 +5000）</li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <a href="lobby.html" class="nav-item">🏠<br>大廳</a>
      <a href="game.html" class="nav-item">⚔️<br>冒險</a>
      <a href="inventory.html" class="nav-item">🎒<br>背包</a>
      <a href="shop.html" class="nav-item">🏪<br>商店</a>
      <a href="ranking.html" class="nav-item active">🏆<br>排行</a>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui-ranking.js"></script>
</body>
</html>
