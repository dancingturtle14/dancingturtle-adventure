<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無限流模擬器 — 交易</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/game-components.css">
</head>
<body>
  <div class="game-layout">
    <div class="top-bar">
      <div class="top-bar-left">
        <a href="lobby.html" class="top-bar-logo" style="text-decoration:none">🌀 無限流模擬器</a>
        <div class="top-bar-tabs">
          <a href="lobby.html" class="tab-btn">🏠 大廳</a>
          <a href="game.html" class="tab-btn">⚔️ 冒險</a>
          <a href="inventory.html" class="tab-btn">🎒 背包</a>
          <a href="shop.html" class="tab-btn">🏪 商店</a>
          <a href="trade.html" class="tab-btn active">🔄 交易</a>
          <a href="ranking.html" class="tab-btn">🏆 排行</a>
        </div>
      </div>
      <div class="top-bar-right">
        <span class="status-badge">💰 <span id="currency-val">0</span></span>
        <div class="avatar-mini" id="avatar-display">🦉</div>
      </div>
    </div>

    <div class="game-content" style="flex-direction:column;overflow-y:auto">
      <div class="trade-page">
        <div class="trade-header">
          <h1>🔄 交易市場</h1>
          <p style="color:var(--text-light);font-size:14px">
            使用資金與其他玩家交易物品（📢 多人交易功能即將推出 Supabase 版本）
          </p>
        </div>

        <div class="trade-content">
          <div class="trade-panel">
            <h3>📤 掛賣你的物品</h3>
            <div id="trade-listings" class="trade-listings">
              <div class="trade-empty">
                <div>🛠️ 交易系統</div>
                <p style="color:var(--text-muted);font-size:13px;margin-top:8px">
                  目前使用本地儲存（示範模式）。Supabase 版本上線後將支援真實玩家交易。
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <a href="lobby.html" class="nav-item">🏠<br>大廳</a>
      <a href="game.html" class="nav-item">⚔️<br>冒險</a>
      <a href="inventory.html" class="nav-item">🎒<br>背包</a>
      <a href="shop.html" class="nav-item">🏪<br>商店</a>
      <a href="ranking.html" class="nav-item">🏆<br>排行</a>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
