<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DancingTurtle 無限流模擬器</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/game-components.css">
</head>
<body>
  <div class="landing">
    <div class="landing-card">
      <div class="landing-logo">
        <span class="icon">🌀</span>
        <h1>無限流模擬器</h1>
        <p>DancingTurtle 文字冒險 · AI 驅動</p>
      </div>

      <!-- Login Form -->
      <div id="login-form">
        <div class="form-group">
          <label>電郵</label>
          <input type="email" id="login-email" class="form-input" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>密碼</label>
          <input type="password" id="login-password" class="form-input" placeholder="輸入密碼">
        </div>
        <div id="login-error" style="color:var(--danger);font-size:13px;margin-bottom:8px;display:none"></div>
        <button class="btn btn-primary" onclick="doLogin()">✦ 登入</button>
        <div class="form-footer">
          <span>未有帳號？<a href="#" onclick="toggleForm('register')">立即註冊</a></span>
        </div>
      </div>

      <!-- Register Form (hidden) -->
      <div id="register-form" style="display:none">
        <div class="form-group">
          <label>玩家名稱</label>
          <input type="text" id="reg-name" class="form-input" placeholder="取一個霸氣嘅名字" value="夜鴞">
        </div>
        <div class="form-group">
          <label>電郵</label>
          <input type="email" id="reg-email" class="form-input" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>密碼</label>
          <input type="password" id="reg-password" class="form-input" placeholder="至少 6 個字">
        </div>
        <div id="reg-error" style="color:var(--danger);font-size:13px;margin-bottom:8px;display:none"></div>
        <button class="btn btn-primary" onclick="doRegister()">✦ 註冊</button>
        <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:12px">
          ⚡ 每日 5 次免費冒險 · 體力每 10 分鐘回復 · 物品可賣商店
        </p>
        <div class="form-footer">
          <span>已有帳號？<a href="#" onclick="toggleForm('login')">返回登入</a></span>
        </div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    // Wait for Supabase to be ready
    let _authReady = false;

    (async function() {
      await loadSupabase();
      _authReady = true;
    })();

    async function loadSupabase() {
      await loadScript('https://unpkg.com/@supabase/supabase-js@2');
      window._supabase = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
      SUPABASE = window._supabase;

      // Check session
      const { data: { session } } = await SUPABASE.auth.getSession();
      if (session) {
        window.location.href = 'lobby.html';
      }
    }

    function toggleForm(mode) {
      document.getElementById('login-form').style.display = mode === 'login' ? 'block' : 'none';
      document.getElementById('register-form').style.display = mode === 'register' ? 'block' : 'none';
      document.getElementById('login-error').style.display = 'none';
      document.getElementById('reg-error').style.display = 'none';
    }

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');

      if (!email || !password) {
        errEl.textContent = '請填寫電郵和密碼';
        errEl.style.display = 'block';
        return;
      }

      errEl.style.display = 'none';
      try {
        const { data, error } = await SUPABASE.auth.signInWithPassword({ email, password });
        if (error) {
          errEl.textContent = error.message;
          errEl.style.display = 'block';
          return;
        }
        window.location.href = 'lobby.html';
      } catch(e) {
        errEl.textContent = '登入失敗：' + e.message;
        errEl.style.display = 'block';
      }
    }

    async function doRegister() {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const errEl = document.getElementById('reg-error');

      if (!name || !email || !password) {
        errEl.textContent = '請填寫所有欄位';
        errEl.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        errEl.textContent = '密碼至少 6 個字';
        errEl.style.display = 'block';
        return;
      }

      errEl.style.display = 'none';
      try {
        const { data, error } = await SUPABASE.auth.signUp({ email, password });
        if (error) {
          errEl.textContent = error.message;
          errEl.style.display = 'block';
          return;
        }

        // Create player profile
        if (data.user) {
          try {
            await SUPABASE.from('players').insert({
              auth_id: data.user.id,
              username: name,
              avatar: '🦉',
            });
          } catch(e) {
            console.warn('Profile creation:', e);
          }
        }

        window.location.href = 'create-character.html';
      } catch(e) {
        errEl.textContent = '註冊失敗：' + e.message;
        errEl.style.display = 'block';
      }
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        if (document.querySelector(`script[src="${src}"]`)) return resolve();
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }
  </script>
</body>
</html>
