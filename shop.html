<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無限流模擬器 — 商店</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/game-components.css">
</head>
<body>
  <div class="game-layout">
    <div class="top-bar">
      <div class="top-bar-left">
        <a href="lobby.html" class="top-bar-logo" style="text-decoration:none">🌀 無限流模擬器</a>
        <div class="top-bar-tabs">
          <a href="lobby.html" class="tab-btn">🏠 大廳</a>
          <a href="game.html" class="tab-btn">⚔️ 冒險</a>
          <a href="inventory.html" class="tab-btn">🎒 背包</a>
          <a href="shop.html" class="tab-btn active">🏪 商店</a>
          <a href="ranking.html" class="tab-btn">🏆 排行</a>
        </div>
      </div>
      <div class="top-bar-right">
        <span class="status-badge">💰 <span id="currency-val">0</span></span>
        <div class="avatar-mini">🏪</div>
      </div>
    </div>

    <div class="game-content" style="flex-direction:column;overflow-y:auto">
      <div class="shop-page">
        <div class="shop-header">
          <div class="shop-npc">
            <span class="shop-npc-avatar">🧙</span>
            <div>
              <h1>🏪 流浪商人</h1>
              <p style="color:var(--text-light);font-size:14px">
                「唔要嘅裝備可以賣俾我，雖然我俾唔到好多錢...」
              </p>
            </div>
          </div>
          <div class="shop-currency">
            💰 持有資金：<span class="currency-amount" id="currency-display">0</span>
          </div>
        </div>

        <div class="shop-sell-section">
          <h3>📤 選擇要賣出的物品</h3>
          <p style="color:var(--text-muted);font-size:13px;margin-bottom:12px">
            賣出價格為物品基礎價值的 20-30% · 冒險不會獲得資金，資金來自出售物品
          </p>
          <div id="shop-items" class="shop-items-list">
            <!-- Rendered by JS -->
          </div>
          <div id="shop-empty" class="inv-empty" style="display:none">
            <div class="empty-icon">📦</div>
            <div class="empty-text">背包沒有可以賣出的物品。<br>去冒險獲取物品再回來吧！</div>
            <a href="game.html" class="btn btn-primary">⚔️ 前往冒險</a>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <a href="lobby.html" class="nav-item">🏠<br>大廳</a>
      <a href="game.html" class="nav-item">⚔️<br>冒險</a>
      <a href="inventory.html" class="nav-item">🎒<br>背包</a>
      <a href="shop.html" class="nav-item active">🏪<br>商店</a>
      <a href="ranking.html" class="nav-item">🏆<br>排行</a>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui-shop.js"></script>
</body>
</html>
