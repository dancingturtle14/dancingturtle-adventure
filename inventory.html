<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無限流模擬器 — 背包</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/game-components.css">
</head>
<body>
  <div class="game-layout">
    <div class="top-bar">
      <div class="top-bar-left">
        <a href="lobby.html" class="top-bar-logo" style="text-decoration:none">🌀 無限流模擬器</a>
        <div class="top-bar-tabs">
          <a href="lobby.html" class="tab-btn">🏠 大廳</a>
          <a href="game.html" class="tab-btn">⚔️ 冒險</a>
          <a href="inventory.html" class="tab-btn active">🎒 背包</a>
          <a href="shop.html" class="tab-btn">🏪 商店</a>
          <a href="ranking.html" class="tab-btn">🏆 排行</a>
        </div>
      </div>
      <div class="top-bar-right">
        <span class="status-badge">💰 <span id="currency-val">0</span></span>
        <div class="avatar-mini" id="avatar-display">🦉</div>
      </div>
    </div>

    <div class="mobile-player-bar">
      <div class="mobile-avatar">🦉</div>
      <div class="mobile-info">
        <div class="name">背包</div>
        <div style="font-size:11px;color:var(--text-light)"><span id="item-count-header">0</span> 件物品</div>
      </div>
    </div>

    <div class="game-content" style="flex-direction:column;overflow-y:auto">
      <div class="inventory-page">
        <div class="inv-header">
          <h1>🎒 背包</h1>
          <div class="inv-filters" id="inv-filters">
            <button class="filter-btn active" data-filter="all" onclick="InvUI.filter('all')">全部</button>
            <button class="filter-btn" data-filter="weapon" onclick="InvUI.filter('weapon')">🗡️ 武器</button>
            <button class="filter-btn" data-filter="armor" onclick="InvUI.filter('armor')">🛡️ 防具</button>
            <button class="filter-btn" data-filter="accessory" onclick="InvUI.filter('accessory')">💍 飾品</button>
            <button class="filter-btn" data-filter="tool" onclick="InvUI.filter('tool')">🔧 工具</button>
            <button class="filter-btn" data-filter="consumable" onclick="InvUI.filter('consumable')">🧪 消耗品</button>
            <button class="filter-btn" data-filter="key" onclick="InvUI.filter('key')">🔑 關鍵</button>
          </div>
        </div>

        <div class="inv-grid" id="inv-grid">
          <!-- Rendered by JS -->
        </div>

        <div class="inv-empty" id="inv-empty" style="display:none">
          <div class="empty-icon">📦</div>
          <div class="empty-text">背包空空的...快去冒險獲取物品吧！</div>
          <a href="game.html" class="btn btn-primary">⚔️ 前往冒險</a>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <a href="lobby.html" class="nav-item">🏠<br>大廳</a>
      <a href="game.html" class="nav-item">⚔️<br>冒險</a>
      <a href="inventory.html" class="nav-item active">🎒<br>背包</a>
      <a href="shop.html" class="nav-item">🏪<br>商店</a>
      <a href="ranking.html" class="nav-item">🏆<br>排行</a>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui-inventory.js"></script>
</body>
</html>
